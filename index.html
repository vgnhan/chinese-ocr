<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Miner</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%233a3e44'/><text x='50' y='74' font-size='64' text-anchor='middle' fill='white' font-family='sans-serif'>&#23433;</text></svg>">
    <style>
        :root {
            --paper:    #f2f3f5;   /* page background (cool light grey) */
            --paper-2:  #e8eaec;   /* sidebar / panels */
            --card:     #fafbfc;   /* cards, result boxes */
            --ink:      #272a2e;   /* main text (cool dark grey) */
            --ink-soft: #6a6f76;   /* muted text */
            --line:     #d9dce0;   /* hairline borders */
            --accent:   #3a3e44;   /* primary buttons (slate grey) */
            --accent-2: #26292e;   /* hover */
            --used:     #b9d4f1;   /* blue   — looked-up translation (reference) */
            --mined:    #f3d68f;   /* amber  — mined, in your deck (in progress) */
            --known:    #b5e0b0;   /* green  — known (got it) */
            --font-ui:   -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            --font-read: Georgia, "Songti SC", "Noto Serif CJK SC", "Source Han Serif SC", "STSong", "SimSun", serif;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--paper);
            color: var(--ink);
            font-family: var(--font-ui);
            margin: 0; padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ===== Title pinned next to the hamburger (fixed; does not scroll with page) ===== */
        #top-title {
            position: absolute; top: 10px; left: 62px;
            height: 40px; line-height: 40px;
            padding: 0 10px; border-radius: 6px;
            font-family: var(--font-read);
            font-size: 16px; font-weight: 700; letter-spacing: 0.4px;
            color: var(--ink);
            background: var(--paper);
            z-index: 90;
            transition: opacity 0.2s ease;
        }
        #top-title.hidden {
            transform: translateY(-150%);
            opacity: 0;
            pointer-events: none;
        }
        /* Step out of the way while the left menu is open */
        body:has(.sidebar.open) #top-title { opacity: 0; pointer-events: none; }

        .sidebar {
            width: 320px;
            background-color: var(--paper-2);
            border-right: 1px solid var(--line);
            display: flex; flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            position: absolute;
            left: -320px; top: 0; bottom: 0;
            z-index: 100;
            transition: left 0.3s ease;
        }
        .sidebar.open { left: 0; }
        .sidebar h3 {
            margin-top: 0;
            color: var(--ink);
            font-family: var(--font-read);
            font-size: 18px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 8px;
        }
        .save-btn {
            padding: 12px; font-size: 15px;
            cursor: pointer;
            background-color: var(--accent);
            color: #fff; border: none;
            border-radius: 6px;
            font-weight: 600;
            margin-bottom: 20px; width: 100%;
            transition: background 0.15s ease;
        }
        .save-btn:hover { background-color: var(--accent-2); }
        .doc-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .doc-item-wrapper {
            display: flex; align-items: center; width: 100%;
            background: var(--card);
            border-radius: 6px;
            border: 1px solid var(--line);
            overflow: hidden;
            transition: border-color 0.2s, background 0.2s;
        }
        .doc-item-wrapper:hover { border-color: var(--ink-soft); }
        .doc-item {
            padding: 12px; cursor: pointer;
            font-size: 15px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
        }
        .doc-item-wrapper.active { background: #dde1e5; border-color: var(--ink-soft); }
        .delete-btn {
            background: transparent; color: var(--ink-soft);
            border: none; padding: 12px 14px; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .delete-btn:hover { color: #b3402f; background-color: rgba(179,64,47,0.08); }

        .main-content {
            flex: 1;
            display: flex; flex-direction: column;
            padding: 64px 40px 40px 40px;
            overflow-y: auto;
            margin-right: 360px;
            width: calc(100% - 360px);
        }

        /* ===== Hamburger: fixed top-left, plain when idle ===== */
        .menu-toggle {
            position: fixed; top: 10px; left: 12px;
            background: transparent; color: var(--ink);
            border: none; border-radius: 6px;
            padding: 8px 14px; font-size: 20px; cursor: pointer; font-weight: bold;
            z-index: 200; box-shadow: none;
            transition: left 0.3s ease, background 0.2s ease, color 0.2s ease;
        }
        .menu-toggle:hover { background: var(--accent); color: #fff; }
        .sidebar.open .menu-toggle { display: none; }
        .menu-toggle.hidden { transform: translateY(-150%); opacity: 0; pointer-events: none; }

        @media (max-width: 900px) {
            .main-content { margin-right: 0; width: 100%; padding: 60px 18px 24px 18px; }
            .slider-container { margin-right: 0 !important; }
            /* clear the fixed hamburger so the sync text doesn't sit under it */
            #sync-status { margin-left: 52px !important; }
        }

        .toolbar {
            width: 100%; max-width: 1000px; margin: 0 auto 30px auto;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--line);
            padding-bottom: 15px; gap: 10px;
        }
        #sync-status { font-size: 13px; color: var(--ink-soft); font-weight: 600; flex: 1; margin-left: 15px; }
        .slider-container { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; color: var(--ink-soft); white-space: nowrap; }
        input[type="range"] { cursor: pointer; accent-color: var(--accent); }

        #floating-tools {
            display: none; position: fixed; z-index: 1000;
            gap: 4px; align-items: center;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 8px; padding: 4px;
            box-shadow: 0 4px 14px rgba(60,50,30,0.18);
        }
        #floating-tools.show { display: flex; }
        #ft-translate {
            background: var(--accent); color: #fff; border: none;
            padding: 6px 12px; font-size: 14px; font-weight: 600; border-radius: 5px; cursor: pointer;
        }
        #ft-translate:hover { background: var(--accent-2); }
        .ft-mark { border: none; border-radius: 5px; width: 30px; height: 30px; font-size: 15px; font-weight: bold; cursor: pointer; color: var(--ink); }
        .ft-mark:hover { filter: brightness(0.94); }

        .translation-sidebar {
            position: fixed; top: 0; right: 0; bottom: 0; width: 360px;
            background: var(--paper-2);
            border-left: 1px solid var(--line);
            padding: 25px 20px;
            display: flex; flex-direction: column; gap: 18px;
            z-index: 99;
            box-shadow: -2px 0 10px rgba(60,50,30,0.05);
            overflow-y: auto;
        }
        .translation-sidebar h3 {
            margin: 0; color: var(--ink); font-family: var(--font-read);
            font-size: 16px; letter-spacing: 0.5px;
            border-bottom: 1px solid var(--line); padding-bottom: 8px;
        }
        .panel-close { display: none; }  /* X removed: tap outside to close */
        .section-title { font-size: 11px; font-weight: 700; color: var(--ink-soft); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
        .result-box {
            background: var(--card); border: 1px solid var(--line); border-radius: 6px;
            padding: 12px; min-height: 56px; max-height: 160px; overflow-y: auto;
            font-size: 16px; line-height: 1.55; color: var(--ink);
            font-family: var(--font-read);
        }
        .pinyin-box { font-family: var(--font-ui); letter-spacing: 0.4px; color: var(--ink-soft); font-weight: 500; }

        .mark-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
        .mark-buttons button { flex: 1 1 calc(50% - 6px); border: none; border-radius: 5px; padding: 8px 6px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--ink); }
        .mark-buttons button:hover { filter: brightness(0.95); }
        .btn-mined { background: var(--mined); }
        .btn-known { background: var(--known); }
        .btn-used  { background: var(--used); }
        .btn-clear { background: #dfe2e6; color: var(--ink-soft); }

        .mark { border-radius: 3px; padding: 0 1px; }
        .mark-mined { background: var(--mined); }
        .mark-known { background: var(--known); }
        .mark-used  { background: var(--used); }

        .legend { font-size: 11px; color: var(--ink-soft); display: flex; flex-direction: column; gap: 3px; }
        .legend span { display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }

        .container { max-width: 1000px; width: 100%; margin: 0 auto; }
        #title-area {
            width: 100%;
            font-family: var(--font-read);
            font-size: 40px; font-weight: 700; line-height: 1.35;
            margin-bottom: 22px; border: none; outline: none; background: transparent; color: var(--ink);
        }
        #title-area:empty::before { content: "Untitled Paragraph..."; color: var(--ink-soft); font-weight: 400; }
        #reader-area {
            width: 100%; min-height: 60vh;
            font-family: var(--font-read);
            font-size: 36px; line-height: 1.95;
            border: none; outline: none; background: transparent; white-space: pre-wrap; color: var(--ink);
        }
        #reader-area:empty::before { content: "Paste or type your Chinese text here..."; color: var(--ink-soft); }

        @media (max-width: 900px) {
            .translation-sidebar {
                position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important;
                top: auto !important; width: 100% !important; height: 48vh !important;
                border-top: 3px solid var(--accent) !important; border-left: none !important;
                transform: translateY(110%); transition: transform 0.3s ease; z-index: 1500;
                border-radius: 14px 14px 0 0;
            }
            .translation-sidebar.visible { transform: translateY(0); }
            #floating-tools { left: 50% !important; top: auto !important; bottom: 20px !important; transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <div id="top-title">Chinese Miner</div>

    <div id="floating-tools">
        <button id="ft-translate">Translate</button>
        <button id="ft-mined" class="ft-mark btn-mined" title="Mark as Mined">★</button>
        <button id="ft-known" class="ft-mark btn-known" title="Mark as Known">✓</button>
        <button id="ft-used"  class="ft-mark btn-used"  title="Mark as Used translation">↺</button>
        <button id="ft-clear" class="ft-mark btn-clear" title="Clear mark">✕</button>
    </div>

    <div class="translation-sidebar" id="translation-sidebar">
        <button class="panel-close" id="panel-close">✕</button>
        <h3>Translator</h3>

        <div>
            <div class="section-title">Original Text</div>
            <div class="result-box" id="box-original">Highlight Chinese text to begin...</div>
        </div>

        <div>
            <div class="section-title">Pinyin</div>
            <div class="result-box pinyin-box" id="box-pinyin">---</div>
        </div>

        <div>
            <div class="section-title">Translation</div>
            <div class="result-box" id="box-english">---</div>
        </div>

        <div>
            <div class="section-title">Mark Selected Word(s)</div>
            <div class="mark-buttons">
                <button class="btn-mined" id="mark-mined">★ Mined</button>
                <button class="btn-known" id="mark-known">✓ Known</button>
                <button class="btn-used"  id="mark-used">↺ Used</button>
                <button class="btn-clear" id="mark-clear">Clear</button>
            </div>
            <div class="legend" style="margin-top:8px;">
                <div><span style="background:#f3d68f;"></span>Mined &nbsp; <span style="background:#b5e0b0;"></span>Known</div>
                <div><span style="background:#b9d4f1;"></span>Used translation</div>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()">☰</button>
        <button class="save-btn" onclick="saveCurrentParagraph()">+ Save & Sync</button>
        <h3>Saved Texts</h3>
        <ul class="doc-list" id="doc-list"></ul>
    </div>

    <div class="main-content" id="main-content">
        <div class="toolbar">
            <span id="sync-status">Connecting to cloud...</span>

            <div class="slider-container">
                <label for="font-slider">A-</label>
                <input type="range" id="font-slider" min="24" max="64" value="36" oninput="changeFontSize(this.value)">
                <label for="font-slider">A+</label>
                <span id="size-display" style="font-size: 14px; font-weight: normal; margin-left: 5px;">(36px)</span>
            </div>
        </div>

        <div class="container">
            <div id="title-area" contenteditable="true"></div>
            <div id="reader-area" contenteditable="true"></div>
        </div>
    </div>

    <script src="https://unpkg.com/pinyin-pro"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjLaqhKJ48HSYBaVMshlt_Lw1Oul3Mvvc",
            authDomain: "chinese-ocr-69fc4.firebaseapp.com",
            projectId: "chinese-ocr-69fc4",
            storageBucket: "chinese-ocr-69fc4.firebasestorage.app",
            messagingSenderId: "161943614491",
            appId: "1:161943614491:web:2fe64763bfb4358a8e34be"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "chineseReader", "sidebarDoc");
        const statusRef = doc(db, "chineseReader", "wordStatus"); // FIX #7: word colors persist in cloud

        const sidebarElement = document.getElementById('sidebar');
        const readerArea = document.getElementById('reader-area');
        const titleArea = document.getElementById('title-area');
        const sizeDisplay = document.getElementById('size-display');
        const docListElement = document.getElementById('doc-list');
        const statusSpan = document.getElementById('sync-status');
        const mainContent = document.getElementById('main-content');
        const menuToggle = document.getElementById('menu-toggle');

        let paragraphs = [];
        let currentActiveId = null;
        let isDirty = false; // tracks unsaved changes for auto-sync

        // FIX #7: word -> status map ("mined" | "known" | "used")
        let wordStatus = {};

        // Word segmenter for Chinese (used by both pinyin grouping and highlighting)
        const segmenter = ('Segmenter' in Intl) ? new Intl.Segmenter('zh', { granularity: 'word' }) : null;
        function segmentWords(str) {
            if (segmenter) return [...segmenter.segment(str)].map(s => s.segment);
            return str.split('');
        }
        function isChinese(s) { return /[\u4e00-\u9fff]/.test(s); }
        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        window.toggleSidebar = function() {
            sidebarElement.classList.toggle('open');
        }

        // Close the menu when clicking anywhere outside of it
        document.addEventListener('click', function(e) {
            if (!sidebarElement.classList.contains('open')) return; // menu already closed
            if (sidebarElement.contains(e.target)) return;          // clicked inside the menu
            if (e.target === menuToggle) return;                    // clicked the toggle itself
            sidebarElement.classList.remove('open');
        });

        async function loadWordStatus() {
            try {
                const snap = await getDoc(statusRef);
                if (snap.exists()) wordStatus = snap.data().map || {};
            } catch (e) { /* offline is fine */ }
        }
        async function saveWordStatus() {
            try { await setDoc(statusRef, { map: wordStatus }); } catch (e) {}
        }

        async function loadFromCloud() {
            statusSpan.innerText = "Syncing with cloud...";
            await loadWordStatus();
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    paragraphs = docSnap.data().list || [];
                    renderSidebar();
                    if (paragraphs.length > 0) {
                        loadParagraph(paragraphs[0].id);
                    }
                    statusSpan.innerText = "Cloud synced.";
                } else {
                    statusSpan.innerText = "Cloud empty. Ready.";
                    renderSidebar();
                }
            } catch (error) {
                statusSpan.innerText = "Cloud offline error.";
            }
        }
        loadFromCloud();

        window.saveCurrentParagraph = async function(auto = false) {
            if (!auto) statusSpan.innerText = "Saving to cloud...";
            const rawTitle = titleArea.innerText.trim();
            const bodyText = readerArea.innerText; // innerText = plain text, ignores highlight spans
            const titleText = rawTitle ? rawTitle : "Untitled Paragraph";

            if (currentActiveId) {
                const index = paragraphs.findIndex(p => p.id === currentActiveId);
                if (index !== -1) {
                    paragraphs[index].title = titleText;
                    paragraphs[index].body = bodyText;
                }
            } else {
                const newId = Date.now().toString();
                paragraphs.push({ id: newId, title: titleText, body: bodyText });
                currentActiveId = newId;
            }

            try {
                await setDoc(docRef, { list: paragraphs });
                statusSpan.innerText = auto ? "Auto-synced ✓" : "Synced successfully!";
                isDirty = false;
                renderSidebar();
            } catch (error) {
                statusSpan.innerText = "Save failed.";
            }
        }

        window.deleteParagraph = async function(id) {
            if (!confirm("Delete this paragraph permanently?")) return;
            paragraphs = paragraphs.filter(p => p.id !== id);
            if (currentActiveId === id) {
                currentActiveId = null;
                titleArea.innerText = '';
                readerArea.innerText = '';
            }
            try {
                await setDoc(docRef, { list: paragraphs });
                statusSpan.innerText = "Deleted and updated.";
                renderSidebar();
            } catch (error) {
                statusSpan.innerText = "Delete error.";
            }
        }

        function renderSidebar() {
            docListElement.innerHTML = '';
            const newSlateItem = document.createElement('div');
            newSlateItem.className = 'doc-item';
            newSlateItem.style.color = 'var(--ink-soft)';
            newSlateItem.style.border = '1px dashed var(--line)';
            newSlateItem.style.background = 'transparent';
            newSlateItem.style.textAlign = 'center';
            newSlateItem.innerText = "[ New text ]";
            newSlateItem.onclick = () => {
                clearCanvas();
                sidebarElement.classList.remove('open');
            };
            docListElement.appendChild(newSlateItem);

            paragraphs.forEach(p => {
                const wrapper = document.createElement('div');
                wrapper.className = `doc-item-wrapper ${p.id === currentActiveId ? 'active' : ''}`;

                const li = document.createElement('div');
                li.className = 'doc-item';
                li.innerText = p.title;
                li.onclick = () => {
                    loadParagraph(p.id);
                    sidebarElement.classList.remove('open');
                };

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerText = '✕';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteParagraph(p.id);
                };

                wrapper.appendChild(li);
                wrapper.appendChild(delBtn);
                docListElement.appendChild(wrapper);
            });
        }

        function loadParagraph(id) {
            currentActiveId = id;
            const target = paragraphs.find(p => p.id === id);
            if (target) {
                titleArea.innerText = target.title;
                readerArea.innerText = target.body;
                applyHighlights(); // FIX #7: paint known/mined/used words
            }
            renderSidebar();
        }

        function clearCanvas() {
            currentActiveId = null;
            titleArea.innerText = '';
            readerArea.innerText = '';
            renderSidebar();
        }

        window.changeFontSize = function(size) {
            readerArea.style.fontSize = size + 'px';
            sizeDisplay.innerText = `(${size}px)`;
        }

        function handleTab(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const selection = window.getSelection();
                const range = selection.getRangeAt(0);
                const tabNode = document.createTextNode("    ");
                range.insertNode(tabNode);
                range.setStartAfter(tabNode);
                range.setEndAfter(tabNode);
                selection.removeAllRanges();
                selection.addRange(range);
            }
        }
        readerArea.addEventListener('keydown', handleTab);

        // Tab in the Title jumps down into the content field (caret at start)
        function caretAtEndOfTitle() {
            const sel = window.getSelection();
            if (!sel.rangeCount) return true;
            const r = sel.getRangeAt(0);
            const probe = r.cloneRange();
            probe.selectNodeContents(titleArea);
            probe.setStart(r.endContainer, r.endOffset);
            return probe.toString().length === 0; // nothing after the caret
        }
        titleArea.addEventListener('keydown', (e) => {
            if (e.key === 'Tab' && !e.shiftKey && caretAtEndOfTitle()) {
                e.preventDefault();
                readerArea.focus();
                const range = document.createRange();
                range.selectNodeContents(readerArea);
                range.collapse(true);
                const sel = window.getSelection();
                sel.removeAllRanges(); sel.addRange(range);
            }
        });

        // Mark unsaved changes whenever the user types
        titleArea.addEventListener('input', () => { isDirty = true; });

        // ===== Re-highlight after edits so deleted/retyped characters don't keep an old colour =====
        // Get/set the caret as a plain character offset so we can rebuild innerHTML without losing place.
        function getCaretOffset(el) {
            const sel = window.getSelection();
            if (!sel.rangeCount) return null;
            const range = sel.getRangeAt(0);
            const pre = range.cloneRange();
            pre.selectNodeContents(el);
            pre.setEnd(range.endContainer, range.endOffset);
            return pre.toString().length;
        }
        function setCaretOffset(el, offset) {
            const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
            let remaining = offset, node;
            while ((node = walker.nextNode())) {
                const len = node.textContent.length;
                if (remaining <= len) {
                    const range = document.createRange();
                    range.setStart(node, remaining);
                    range.collapse(true);
                    const sel = window.getSelection();
                    sel.removeAllRanges(); sel.addRange(range);
                    return;
                }
                remaining -= len;
            }
            const range = document.createRange();
            range.selectNodeContents(el); range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges(); sel.addRange(range);
        }

        let isComposing = false;           // true while an IME (e.g. Pinyin input) is composing
        let highlightTimer = null;
        readerArea.addEventListener('compositionstart', () => { isComposing = true; });
        readerArea.addEventListener('compositionend', () => { isComposing = false; scheduleRehighlight(); });

        function scheduleRehighlight() {
            clearTimeout(highlightTimer);
            highlightTimer = setTimeout(() => {
                if (isComposing) return;
                const offset = getCaretOffset(readerArea);
                applyHighlights();
                if (offset != null) setCaretOffset(readerArea, offset);
            }, 300);
        }

        readerArea.addEventListener('input', () => {
            isDirty = true;
            if (!isComposing) scheduleRehighlight();
        });

        // Auto-sync every 30 seconds, but only when something actually changed
        setInterval(() => {
            const hasContent = readerArea.innerText.trim().length > 0;
            if (isDirty && (currentActiveId || hasContent)) {
                saveCurrentParagraph(true); // true = quiet "Auto-synced" status
            }
        }, 30000);

        // ===== FIX #3: paste as PLAIN TEXT (strips all incoming formatting) =====
        function plainPaste(e) {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text/plain');
            document.execCommand('insertText', false, text);
        }
        readerArea.addEventListener('paste', plainPaste);
        titleArea.addEventListener('paste', plainPaste);

        // ===== FIX #3: copying OUT of the reader yields plain text =====
        // (so the colored highlight spans never leak formatting into Anki)
        function plainCopy(e) {
            const sel = window.getSelection().toString();
            if (sel) {
                e.clipboardData.setData('text/plain', sel);
                e.preventDefault();
            }
        }
        readerArea.addEventListener('copy', plainCopy);
        readerArea.addEventListener('cut', plainCopy);

        // re-apply highlights after the user finishes editing
        readerArea.addEventListener('blur', () => applyHighlights());

        // ===== FIX #7: highlight engine =====
        function applyHighlights() {
            const text = readerArea.innerText;
            if (!text) { readerArea.innerHTML = ''; return; }

            // Device-independent: scan the text and paint the longest marked
            // word found at each position, instead of relying on the browser's
            // word segmenter (which differs between desktop and phones).
            const chars = Array.from(text); // safe for multi-unit characters
            let maxLen = 0;
            for (const w of Object.keys(wordStatus)) {
                const L = Array.from(w).length;
                if (L > maxLen) maxLen = L;
            }

            let html = '';
            let i = 0;
            while (i < chars.length) {
                const ch = chars[i];
                if (maxLen > 0 && isChinese(ch)) {
                    let matched = null;
                    const upper = Math.min(maxLen, chars.length - i);
                    for (let len = upper; len >= 1; len--) {
                        const slice = chars.slice(i, i + len).join('');
                        if (wordStatus[slice]) { matched = slice; break; }
                    }
                    if (matched) {
                        html += `<span class="mark mark-${wordStatus[matched]}">${escapeHtml(matched)}</span>`;
                        i += Array.from(matched).length;
                        continue;
                    }
                }
                html += escapeHtml(ch);
                i += 1;
            }
            readerArea.innerHTML = html;
        }

        // mark the currently selected text into a status category
        window.markSelection = function(category) {
            const sel = window.getSelection().toString().trim() || window.__lastSelected || "";
            if (!sel) return;
            const words = segmentWords(sel);
            words.forEach(w => {
                if (!isChinese(w)) return;
                // Known is final: only Clear can change it.
                if (wordStatus[w] === 'known' && category !== 'clear') return;
                // Mined cannot be downgraded to a translation ("used"); it can still become Known or be cleared.
                if (wordStatus[w] === 'mined' && category === 'used') return;
                if (category === 'clear') delete wordStatus[w];
                else wordStatus[w] = category;
            });
            saveWordStatus();
            applyHighlights();
        }

        document.getElementById('mark-mined').onclick = () => markSelection('mined');
        document.getElementById('mark-known').onclick = () => markSelection('known');
        document.getElementById('mark-used').onclick  = () => markSelection('used');
        document.getElementById('mark-clear').onclick = () => markSelection('clear');
    </script>

    <script>
        const floatingTools = document.getElementById('floating-tools');
        const translateBtn = document.getElementById('ft-translate');
        const boxOriginal = document.getElementById('box-original');
        const boxPinyin = document.getElementById('box-pinyin');
        const boxEnglish = document.getElementById('box-english');
        const translationPanel = document.getElementById('translation-sidebar');
        const panelClose = document.getElementById('panel-close');
        const menuBtn = document.getElementById('menu-toggle');
        const mainEl = document.getElementById('main-content');
        let selectedText = "";

        const isMobile = () => window.matchMedia('(max-width: 900px)').matches;

        // ===== FIX #1 + #4: show translate button on selection (works on touch too) =====
        function updateSelectionButton() {
            const selection = window.getSelection();
            const text = selection.toString().trim();

            if (text.length > 0) {
                selectedText = text;
                window.__lastSelected = text; // remembered for the Mark buttons
                if (isMobile()) {
                    // Mobile: fixed bottom-centre so it never jumps around mid-selection
                    floatingTools.classList.add('show');
                } else {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    // centre the toolbar over the selection (toolbar ~ 220px wide)
                    floatingTools.style.left = `${rect.left + (rect.width / 2) - 110}px`;
                    floatingTools.style.top = `${rect.top - 46}px`;
                    floatingTools.classList.add('show');
                }
            } else {
                floatingTools.classList.remove('show');
            }
        }

        function hideTools() { floatingTools.classList.remove('show'); }

        // While the selection is actively changing (dragging / extending), keep the toolbar
        // hidden; show it only once the selection has settled for a moment.
        let selDebounce;
        document.addEventListener('selectionchange', () => {
            hideTools();
            clearTimeout(selDebounce);
            selDebounce = setTimeout(updateSelectionButton, 400);
        });

        // Desktop: pressing down to start a selection hides it immediately; releasing shows it.
        document.addEventListener('mousedown', (e) => {
            if (!floatingTools.contains(e.target)) hideTools();
        });
        document.addEventListener('mouseup', (e) => {
            if (floatingTools.contains(e.target)) return; // clicking a tool button
            clearTimeout(selDebounce);
            setTimeout(updateSelectionButton, 10); // let the selection finalize first
        });

        // ===== Mobile: close the translator by tapping anywhere outside it (no X button) =====
        document.addEventListener('click', (e) => {
            if (!isMobile()) return;
            if (!translationPanel.classList.contains('visible')) return;
            if (translationPanel.contains(e.target)) return; // tapped inside the panel
            if (floatingTools.contains(e.target)) return;     // the Translate button that opened it
            translationPanel.classList.remove('visible');
        });

        // ===== Copying from the Translator boxes yields plain text (no formatting) =====
        translationPanel.addEventListener('copy', (e) => {
            const sel = window.getSelection().toString();
            if (sel) { e.clipboardData.setData('text/plain', sel); e.preventDefault(); }
        });

        // ===== Hamburger hides on scroll down, shows on scroll up. Title stays pinned. =====
        const topTitle = document.getElementById('top-title');
        let lastScroll = 0;
        mainEl.addEventListener('scroll', () => {
            const y = mainEl.scrollTop;
            const goingDown = y > lastScroll && y > 60;
            menuBtn.classList.toggle('hidden', goingDown);
            topTitle.classList.toggle('hidden', goingDown);
            lastScroll = y;
        });

        translateBtn.addEventListener('click', async function() {
            if (selectedText.length > 0) {
                floatingTools.classList.remove('show');

                // FIX #1: reveal panel on mobile when translation is actually called
                if (isMobile()) translationPanel.classList.add('visible');

                boxOriginal.innerText = selectedText;
                boxPinyin.innerText = "...";
                boxEnglish.innerText = "Translating...";

                // ===== FIX #6: pinyin grouped by word (multi-char words stay joined) =====
                try {
                    const { pinyin } = pinyinPro;
                    let grouped;
                    if ('Segmenter' in Intl) {
                        const segs = [...new Intl.Segmenter('zh', { granularity: 'word' }).segment(selectedText)];
                        grouped = segs.map(s => {
                            const w = s.segment;
                            if (/[\u4e00-\u9fff]/.test(w)) {
                                return pinyin(w, { toneType: 'symbol', separator: '', v: true });
                            }
                            return w;
                        }).join(' ').replace(/\s+/g, ' ').trim();
                    } else {
                        // Fallback: let pinyin-pro segment, then collapse within words
                        grouped = pinyin(selectedText, { toneType: 'symbol', segment: true, v: true });
                    }
                    boxPinyin.innerText = grouped;
                } catch (pinyinError) {
                    console.error("Pinyin error:", pinyinError);
                    boxPinyin.innerText = "(pinyin unavailable)";
                }

                // ===== TRANSLATION (network) =====
                try {
                    const response = await fetch(
                        `https://api.mymemory.translated.net/get?q=${encodeURIComponent(selectedText)}&langpair=zh-CN|vi`
                    );
                    const data = await response.json();
                    if (data.responseData) {
                        boxEnglish.innerText = data.responseData.translatedText;
                    } else {
                        boxEnglish.innerText = "Translation parsing error.";
                    }
                } catch (error) {
                    boxEnglish.innerText = "Network translation failed.";
                }
            }
        });

        // ===== Floating colour-code buttons: mark, then hide the toolbar =====
        function floatingMark(category) {
            if (window.markSelection) window.markSelection(category);
            floatingTools.classList.remove('show');
        }
        document.getElementById('ft-mined').addEventListener('click', () => floatingMark('mined'));
        document.getElementById('ft-known').addEventListener('click', () => floatingMark('known'));
        document.getElementById('ft-used').addEventListener('click',  () => floatingMark('used'));
        document.getElementById('ft-clear').addEventListener('click', () => floatingMark('clear'));
    </script>

</body>
</html>
