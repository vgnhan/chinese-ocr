<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chinese Reader</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #fcf8e3; /* Soft, warm yellowish background */
            color: #2c3e50;            /* Dark charcoal text */
            font-family: "PingFang SC", "Microsoft YaHei", "SimSun", sans-serif; 
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Left Sidebar Layout */
        .sidebar {
            width: 320px;
            background-color: #f4edd0;
            border-right: 1px solid #e1dbb7;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            position: absolute;
            left: -320px; 
            top: 0;
            bottom: 0;
            z-index: 100;
            transition: left 0.3s ease; 
        }
        .sidebar.open {
            left: 0;
        }
        .sidebar h3 {
            margin-top: 0;
            color: #795548;
            font-size: 18px;
            border-bottom: 2px solid #795548;
            padding-bottom: 8px;
        }
        .save-btn {
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            background-color: #795548;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 20px;
            width: 100%;
        }
        .save-btn:hover {
            background-color: #5d4037;
        }
        .doc-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .doc-item-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            background: #fdfcf7;
            border-radius: 4px;
            border: 1px solid #e6dfc3;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .doc-item-wrapper:hover {
            border-color: #795548;
        }
        .doc-item {
            padding: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .doc-item-wrapper.active {
            background: #eedea6;
            border-color: #795548;
        }

        .delete-btn {
            background: transparent;
            color: #a19b80; 
            border: none;
            padding: 12px 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .delete-btn:hover {
            color: #c9302c; 
            background-color: rgba(201, 48, 44, 0.08); 
        }

        /* Main Content Area Layout */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 40px 40px 40px;
            overflow-y: auto;
            margin-right: 360px; /* Leaves permanent space for the right translator sidebar */
            width: calc(100% - 360px);
        }
        
        @media (max-width: 900px) {
            .main-content {
                margin-right: 0;
                width: 100%;
                padding: 20px;
            }
            #translation-sidebar {
                position: fixed !important;
                bottom: 10px !important;
                right: 10px !important;
                top: auto !important;
                width: calc(100% - 20px) !important;
                height: 220px !important;
                border-top: 5px solid #795548 !important;
                border-left: none !important;
            }
            .slider-container {
                margin-right: 0 !important;
            }
        }

        .toolbar {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e1dbb7;
            padding-bottom: 15px;
            gap: 10px;
        }
        
        .menu-toggle {
            background: #795548;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 14px;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
            z-index: 101;
        }

        #sync-status {
            font-size: 14px;
            color: #a19b80;
            font-weight: bold;
            flex: 1;
            margin-left: 15px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #795548;
            white-space: nowrap;
        }
        input[type="range"] {
            cursor: pointer;
            accent-color: #795548;
        }

        /* Contextual Text Highlight Button */
        #highlight-translate-btn {
            display: none;
            position: absolute;
            z-index: 1000;
            background: #795548;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #highlight-translate-btn:hover {
            background: #5d4037;
        }

        /* ALWAYS AVAILABLE: Fixed Translation Sidebar on the Right */
        .translation-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 360px;
            background: #fdfbf7;
            border-left: 1px solid #e1dbb7;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 99;
            box-shadow: -2px 0 8px rgba(0,0,0,0.05);
        }
        .translation-sidebar h3 {
            margin: 0;
            color: #795548;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #e1dbb7;
            padding-bottom: 8px;
        }
        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: #a19b80;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .result-box {
            background: #fff;
            border: 1px solid #e6dfc3;
            border-radius: 4px;
            padding: 12px;
            min-height: 60px;
            max-height: 160px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.5;
            color: #2c3e50;
        }
        .pinyin-box {
            font-family: sans-serif;
            letter-spacing: 0.5px;
            color: #795548;
            font-weight: 500;
        }

        .container {
            max-width: 1000px;         
            width: 100%;
            margin: 0 auto;
        }

        #title-area {
            width: 100%;
            font-size: 48px;         
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 25px;
            border: none;
            outline: none;
            background: transparent;
        }
        #title-area:empty::before {
            content: "Untitled Paragraph...";
            color: #a19b80;
            font-weight: normal;
        }

        #reader-area {
            width: 100%;
            min-height: 60vh;
            font-size: 36px;         
            line-height: 1.9;      
            border: none;
            outline: none;
            background: transparent;
            white-space: pre-wrap;  
        }
        #reader-area:empty::before {
            content: "Paste or type your Chinese text here...";
            color: #a19b80;
        }
    </style>
</head>
<body>

    <button id="highlight-translate-btn">Translate</button>

    <div class="translation-sidebar" id="translation-sidebar">
        <h3>Translator</h3>
        
        <div>
            <div class="section-title">Original Text</div>
            <div class="result-box" id="box-original">Highlight Chinese text to begin...</div>
        </div>

        <div>
            <div class="section-title">Pinyin</div>
            <div class="result-box pinyin-box" id="box-pinyin">---</div>
        </div>

        <div>
            <div class="section-title">Translation</div>
            <div class="result-box" id="box-english">---</div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="save-btn" onclick="saveCurrentParagraph()">+ Save & Sync</button>
        <h3>Saved Texts</h3>
        <ul class="doc-list" id="doc-list"></ul>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <span id="sync-status">Connecting to cloud...</span>
            
            <div class="slider-container">
                <label for="font-slider">A-</label>
                <input type="range" id="font-slider" min="24" max="64" value="36" oninput="changeFontSize(this.value)">
                <label for="font-slider">A+</label>
                <span id="size-display" style="font-size: 14px; font-weight: normal; margin-left: 5px;">(36px)</span>
            </div>
        </div>

        <div class="container">
            <div id="title-area" contenteditable="true"></div>
            <div id="reader-area" contenteditable="true"></div>
        </div>
    </div>

    <script src="https://unpkg.com/pinyin-pro"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // !!! PASTE YOUR FIREBASE ACCREDITATION DATA HERE !!!
	const firebaseConfig = {
  	apiKey: "AIzaSyDjLaqhKJ48HSYBaVMshlt_Lw1Oul3Mvvc",
 	authDomain: "chinese-ocr-69fc4.firebaseapp.com",
  	projectId: "chinese-ocr-69fc4",
  	storageBucket: "chinese-ocr-69fc4.firebasestorage.app",
  	messagingSenderId: "161943614491",
  	appId: "1:161943614491:web:2fe64763bfb4358a8e34be"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "chineseReader", "sidebarDoc");

        const sidebarElement = document.getElementById('sidebar');
        const readerArea = document.getElementById('reader-area');
        const titleArea = document.getElementById('title-area');
        const sizeDisplay = document.getElementById('size-display');
        const docListElement = document.getElementById('doc-list');
        const statusSpan = document.getElementById('sync-status');

        let paragraphs = [];
        let currentActiveId = null;

        window.toggleSidebar = function() {
            sidebarElement.classList.toggle('open');
        }

        async function loadFromCloud() {
            statusSpan.innerText = "Syncing with cloud...";
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    paragraphs = docSnap.data().list || [];
                    renderSidebar();
                    if (paragraphs.length > 0) {
                        loadParagraph(paragraphs[0].id);
                    }
                    statusSpan.innerText = "Cloud synced.";
                } else {
                    statusSpan.innerText = "Cloud empty. Ready.";
                    renderSidebar();
                }
            } catch (error) {
                statusSpan.innerText = "Cloud offline error.";
            }
        }
        loadFromCloud();

        window.saveCurrentParagraph = async function() {
            statusSpan.innerText = "Saving to cloud...";
            const rawTitle = titleArea.innerText.trim();
            const bodyText = readerArea.innerText;
            const titleText = rawTitle ? rawTitle : "Untitled Paragraph";

            if (currentActiveId) {
                const index = paragraphs.findIndex(p => p.id === currentActiveId);
                if (index !== -1) {
                    paragraphs[index].title = titleText;
                    paragraphs[index].body = bodyText;
                }
            } else {
                const newId = Date.now().toString();
                paragraphs.push({ id: newId, title: titleText, body: bodyText });
                currentActiveId = newId;
            }

            try {
                await setDoc(docRef, { list: paragraphs });
                statusSpan.innerText = "Synced successfully!";
                renderSidebar();
            } catch (error) {
                statusSpan.innerText = "Save failed.";
            }
        }

        window.deleteParagraph = async function(id) {
            if (!confirm("Delete this paragraph permanently?")) return;
            paragraphs = paragraphs.filter(p => p.id !== id);
            if (currentActiveId === id) {
                currentActiveId = null;
                titleArea.innerText = '';
                readerArea.innerText = '';
            }
            try {
                await setDoc(docRef, { list: paragraphs });
                statusSpan.innerText = "Deleted and updated.";
                renderSidebar();
            } catch (error) {
                statusSpan.innerText = "Delete error.";
            }
        }

        function renderSidebar() {
            docListElement.innerHTML = '';
            const newSlateItem = document.createElement('div');
            newSlateItem.className = 'doc-item';
            newSlateItem.style.color = '#795548';
            newSlateItem.style.border = '1px dashed #795548';
            newSlateItem.style.background = 'transparent';
            newSlateItem.style.textAlign = 'center';
            newSlateItem.innerText = "[ Clear Canvas ]";
            newSlateItem.onclick = () => {
                clearCanvas();
                sidebarElement.classList.remove('open');
            };
            docListElement.appendChild(newSlateItem);

            paragraphs.forEach(p => {
                const wrapper = document.createElement('div');
                wrapper.className = `doc-item-wrapper ${p.id === currentActiveId ? 'active' : ''}`;

                const li = document.createElement('div');
                li.className = 'doc-item';
                li.innerText = p.title;
                li.onclick = () => {
                    loadParagraph(p.id);
                    sidebarElement.classList.remove('open');
                };

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerText = '✕';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteParagraph(p.id);
                };

                wrapper.appendChild(li);
                wrapper.appendChild(delBtn);
                docListElement.appendChild(wrapper);
            });
        }

        function loadParagraph(id) {
            currentActiveId = id;
            const target = paragraphs.find(p => p.id === id);
            if (target) {
                titleArea.innerText = target.title;
                readerArea.innerText = target.body;
            }
            renderSidebar();
        }

        function clearCanvas() {
            currentActiveId = null;
            titleArea.innerText = '';
            readerArea.innerText = '';
            renderSidebar();
        }

        window.changeFontSize = function(size) {
            readerArea.style.fontSize = size + 'px';
            sizeDisplay.innerText = `(${size}px)`;
        }

        function handleTab(e) {
            if (e.key === 'Tab') {
                e.preventDefault(); 
                const selection = window.getSelection();
                const range = selection.getRangeAt(0);
                const tabNode = document.createTextNode("    "); 
                range.insertNode(tabNode);
                range.setStartAfter(tabNode);
                range.setEndAfter(tabNode); 
                selection.removeAllRanges();
                selection.addRange(range);
            }
        }
        readerArea.addEventListener('keydown', handleTab);
        titleArea.addEventListener('keydown', handleTab);
    </script>

    <script>
        const translateBtn = document.getElementById('highlight-translate-btn');
        const boxOriginal = document.getElementById('box-original');
        const boxPinyin = document.getElementById('box-pinyin');
        const boxEnglish = document.getElementById('box-english');
        let selectedText = "";

        // Track user text selections
        document.addEventListener('mouseup', function(e) {
            const selection = window.getSelection();
            selectedText = selection.toString().trim();

            if (selectedText.length > 0) {
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();

                // Position floating action helper cleanly over selection
                translateBtn.style.left = `${rect.left + window.scrollX + (rect.width / 2) - 50}px`;
                translateBtn.style.top = `${rect.top + window.scrollY - 40}px`;
                translateBtn.style.display = 'block';
            } else {
                if (e.target !== translateBtn) {
                    translateBtn.style.display = 'none';
                }
            }
        });

        document.addEventListener('mousedown', function(e) {
            if (e.target !== translateBtn) {
                translateBtn.style.display = 'none';
            }
        });

        // Trigger translation execution inside side container fields
        translateBtn.addEventListener('click', async function() {
            if (selectedText.length > 0) {
                translateBtn.style.display = 'none';
                
                // 1. Output original text to sidebar
                boxOriginal.innerText = selectedText;
                boxEnglish.innerText = "Translating...";

                // 2. Compute local Pinyin using pinyinPro CDN library instantly
                try {
                    const { pinyin } = pinyinPro;
                    boxPinyin.innerText = pinyin(selectedText, { toneType: 'symbol' });
                } catch(pinyinError) {
                    boxPinyin.innerText = "Pinyin calculation error.";
                }

                // 3. Fetch background Translation
                try {
                    const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(selectedText)}&langpair=zh-CN|vi`);
                    const data = await response.json();
                    
                    if(data.responseData) {
                        boxEnglish.innerText = data.responseData.translatedText;
                    } else {
                        boxEnglish.innerText = "Translation parsing error.";
                    }
                } catch (error) {
                    boxEnglish.innerText = "Network translation failed.";
                }
            }
        });
    </script>
</body>
</html>
